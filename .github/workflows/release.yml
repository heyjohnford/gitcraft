name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (stable, alpha, beta, rc)'
        required: false
        default: 'stable'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required — gitcraft reads all commits since last tag
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Compute next version (dry run)
        id: version
        run: |
          OUTPUT=$(node dist/cli/index.js release --dry-run --channel "${{ inputs.channel }}")
          echo "$OUTPUT"
          TAG=$(echo "$OUTPUT" | grep "Tag:" | awk '{print $2}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: node dist/cli/index.js release --channel "${{ inputs.channel }}"

      - name: Commit changelog, create tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.tag }}"
          npm version "${VERSION#v}" --no-git-tag-version
          git add CHANGELOG.md package.json
          git diff --staged --quiet || git commit -m "chore(release): $VERSION"
          git tag "${VERSION}"
          git push origin HEAD "${VERSION}"

      - name: Publish to npm
        run: |
          TAG="${{ inputs.channel }}"
          if [ "$TAG" = "stable" ]; then
            npm publish --access public
          else
            npm publish --access public --tag "alpha"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
