trigger:
  branches:
    include:
      - main
      - develop
      - release/*
      - feature/*

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '24.x'
    displayName: 'Install Node.js 24.x'

  # fetchDepth: 0 is required — GitCraft needs full history to resolve tags
  - checkout: self
    fetchDepth: 0

  - task: GitCraft@1
    name: gitcraft
    displayName: 'GitCraft: version & release'
    inputs:
      releaseChannel: stable # or: alpha, beta, rc, feature
      tagPrefix: v
      dryRun: false

  - script: |
      echo "Released version : $(gitcraft.GitCraft.Version)"
      echo "Git tag          : $(gitcraft.GitCraft.Tag)"
      echo "Bump type        : $(gitcraft.GitCraft.BumpType)"
    displayName: 'Show release info'
